# roles/podman_quadlet/defaults/main.yml
###############################################################################
# Public API
###############################################################################

###############################################################################
podman_quadlet_app_name: ''
###############################################################################
# mandatory: the application name
###############################################################################

###############################################################################
podman_quadlet_files_templates_src_path: ''
###############################################################################
# mandatory: Root path of files and templates folder, containing:
# <podman_quadlet_files_templates_src_path>
#   |- files
#   |    |- quadlets
#   |    |      |- application.pod
#   |    |      |- application-db.container
#   |    |      |- application-db-conf.volume
#   |    |      |- application-web-log.volume
#   |    |      |- ...
#   |    |- volumes
#   |           |- application-db-conf
#   |           |      |- app-db-conf.cfg
#   |           |- application-web-log
#   |                  |- logs-rotate.cfg
#   |- templates
#        |- quadlets
#        |      |- application-web.container.j2
#        |      |- ...
#        |- volumes
#               |- application-web-log
#                     |- logging.cfg.j2
#
###############################################################################

###############################################################################
podman_quadlet_file_names: ''
###############################################################################
# mandatory: a list of podman quadlet file names
# Currently supported quadlets:
#   $name.pod or $name.pod.j2
#   $name.container or $name.container.j2
#   $name.volume or $name.volume.j2
# E.g.:
# podman_quadlet_file_names:
#   - application.pod
#   - application-db.container
#   - application-web.container.j2
#   - application-db-conf.volume
#   - application-web-log.volume
###############################################################################

###############################################################################
podman_quadlet_volumes_files_to_stage: []
###############################################################################
# optional: dict of files per volume to be staged
# --------------------------------------------------------------------------- #
# volumes example structure:
# --------------------------------------------------------------------------- #
# podman_quadlet_volumes_files_to_stage:
#   - name: application-web-log
#     files:
#       - src: app-db-conf.cfg
#         dest: /foo/bar/app-db-conf.cfg (Default: same as src)
#         state: file (Default: file for files and templates. Other possible value: directory )
#         owner: 0 (Default: 0. See note on rootless UID/GID below)
#         group: 0 (Default: 0. See note on rootless UID/GID below)
#         mode: "0600" (Default for files: 0644; Default for directories: "0755")
#
# Rootless UID/GID:
#   For rootless containers, owner/group are CONTAINER-PERSPECTIVE UIDs/GIDs.
#   E.g., owner: 33 means UID 33 inside the container (www-data), not UID 33
#   on the host. The role uses 'podman unshare chown' to map these correctly
#   through Podman's user namespace.
#   Default 0 = root inside the container = the rootless host user.
#
# Rootful UID/GID:
#   For rootful containers, owner/group are HOST UIDs/GIDs (no namespace
#   remapping). Default 0 = root on the host.
#
#       - src: peers/
#         state: directory
#         mode: "0700"
#
#       - src: peers/peer1.conf.j2
#         state: template
#         mode: "0600"
#
###############################################################################

###############################################################################
podman_quadlet_volumes_config_patches: []
###############################################################################
# optional: patches to apply to existing config files inside Podman volumes
# --------------------------------------------------------------------------- #
# Instead of replacing entire files, this patches specific values in existing
# configuration files that already live inside the volume (e.g. created by the
# container on first start).
# --------------------------------------------------------------------------- #
# podman_quadlet_volumes_config_patches:
#   - name: volume-name
#     patches:
#       - file: path/to/config.yml
#         format: yaml                     # yaml | json | ini | xml | keyvalue
#         owner: 0                         # container-perspective UID (default: 0)
#         group: 0                         # container-perspective GID (default: 0)
#         set:                             # for yaml/json/ini/keyvalue
#           key: value
#           nested.key: value              # dot-notation for yaml/json
#         section: ""                      # for ini format only
#         delimiter: "="                   # for keyvalue format only (default: "=")
#         xpath_patches:                   # for xml format only
#           - xpath: /config/server/port
#             value: "8096"
#
# Rootless UID/GID:
#   Same rules as podman_quadlet_volumes_files_to_stage: owner/group are
#   container-perspective UIDs/GIDs. The role uses 'podman unshare chown'
#   to map these correctly through Podman's user namespace.
#
# Rootful UID/GID:
#   owner/group are HOST UIDs/GIDs (no namespace remapping).
#
###############################################################################

###############################################################################
podman_quadlet_rootless_user_name: ''
###############################################################################
# optional: Linux user name for rootless container.
###############################################################################

###############################################################################
podman_quadlet_firewall_ports: []
###############################################################################
# optional: firewall ports to manage
# e.g.: 8080/tcp or 9090/udp
# podman_quadlet_firewall_ports:
#   - 8080/tcp
#   - 9090/udp
#   - 32768-60999/tcp
#   - 32768-60999/udp
###############################################################################

###############################################################################
podman_quadlet_firewall_port_forwards: []
###############################################################################
# optional: firewall port forwards to manage
# Useful for rootless containers that cannot bind to privileged ports (< 1024).
# Each entry forwards a host port to a container port.
#
# podman_quadlet_firewall_port_forwards:
#   - port: 443
#     proto: tcp
#     toport: 8443
#   - port: 53
#     proto: udp
#     toport: 1053
###############################################################################

###############################################################################
# Internally computed by the role - no need to set something
###############################################################################
# Rootless user uid
podman_quadlet_rootless_user_uid: ''

# Rootless user gid
podman_quadlet_rootless_user_gid: ''

# Full path name of the container src file/template on localhost
podman_quadlet_src_container_file_name_full_path: ''

# Full path name of the systemd folder on remote system
# set in tasks/
podman_quadlet_systemd_dir: ''

# Firewall status set in asserts/assert-firewall.yml
podman_quadlet_firewall_status: ''

# List of the full path name of all quadlet files
podman_quadlet_resolved_files: []

# List of the full path name of all files to be deployed to volumes
# Set in tasks/asserts/
podman_quadlet_resolved_volume_files: []
