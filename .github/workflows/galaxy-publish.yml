name: Publish to Ansible Galaxy
# Lint runs on PRs and pushes to main so regressions are caught before
# a release tag is pushed. Publish only runs on tag pushes.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-core ansible-lint
      - run: ansible-lint

  publish:
    needs: lint
    # Only publish on a release tag push — never on PR or main push.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-core
      - run: >-
          ansible-galaxy role import
          --api-key "${{ secrets.GALAXY_API_KEY }}"
          ${{ github.repository_owner }}
          $(basename ${{ github.repository }})
