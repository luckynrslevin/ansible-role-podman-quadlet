---
# Pre-pull container images for the rootless user.
# Extracts Image= lines from deployed .container quadlet files and
# pulls each unique image before the systemd restart. This prevents
# TimeoutStartSec from expiring on first deploy when images aren't
# cached locally.
#
# Pull policy (podman_quadlet_pull_policy, default "newer") avoids
# re-downloading image blobs when the local copy is already up to date
# — the registry is still consulted for a manifest comparison, but
# only blobs for changed layers are transferred. When the registry
# itself is unreachable (network outage, Docker Hub anonymous pull
# rate limit, etc.) and the image is already cached locally, the
# pull step logs a warning and proceeds with the cached image.
# Without a cached image and with a failed pull, the play fails hard.

- name: Find container quadlet files
  ansible.builtin.find:
    paths: "{{ podman_quadlet_systemd_dir }}"
    patterns: "*.container"
  register: _pre_pull_container_files

- name: Extract image names from quadlet files
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      grep -h '^Image=' {{ _pre_pull_container_files.files | map(attribute='path') | join(' ') }} \
        | sed 's/^Image=//' | sort -u
  args:
    executable: /bin/bash
  register: _pre_pull_images
  changed_when: false
  when: _pre_pull_container_files.files | length > 0

- name: Pre-pull container images for rootless user (fall back to cached image on registry failure)
  become: true
  ansible.builtin.shell: |
    set -o pipefail
    PULL_CMD="XDG_RUNTIME_DIR=/run/user/{{ podman_quadlet_rootless_user_uid }} \
      podman pull --policy={{ podman_quadlet_pull_policy }} {{ item | quote }}"
    EXISTS_CMD="XDG_RUNTIME_DIR=/run/user/{{ podman_quadlet_rootless_user_uid }} \
      podman image exists {{ item | quote }}"
    if su {{ podman_quadlet_rootless_user_name }} -c "$PULL_CMD"; then
      exit 0
    fi
    echo "[warn] podman pull failed for {{ item }}; checking local cache" >&2
    if su {{ podman_quadlet_rootless_user_name }} -c "$EXISTS_CMD"; then
      echo "[warn] using locally cached image for {{ item }} (registry unreachable or rate-limited)" >&2
      exit 0
    fi
    echo "[err] pull failed and no cached image for {{ item }}" >&2
    exit 1
  args:
    executable: /bin/bash
  register: _pre_pull_result
  loop: "{{ _pre_pull_images.stdout_lines | default([]) }}"
  loop_control:
    label: "{{ item }}"
  changed_when: >-
    'Writing manifest' in _pre_pull_result.stdout or
    'Writing manifest' in (_pre_pull_result.stderr | default(''))
  when: _pre_pull_images.stdout_lines | default([]) | length > 0
